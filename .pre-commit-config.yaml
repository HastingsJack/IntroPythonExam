repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  #- repo: local
    #hooks:
      #- id: pytest
        #name: Run tests
        #entry: uv run pytest
        #language: system
        #pass_filenames: false

  - repo: local
    hooks:
      - id: pyright
        name: Pyright type check
        entry: uv run pyright
        language: system
        pass_filenames: false